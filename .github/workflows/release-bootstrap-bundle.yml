name: Release Bootstrap Bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: optional release version (example 0.1.14). if empty, auto version is generated
        required: false
  push:
    branches:
      - main
    paths:
      - "bootstrap/**"
      - "scripts/package_bootstrap_bundle.sh"
      - "scripts/install_bootstrap_bundle.sh"
      - "infra/templates/bootstrap-*.env.tftpl"
      - ".github/workflows/release-bootstrap-bundle.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            else
              ts="$(date -u +%Y%m%d%H%M%S)"
              short_sha="$(echo "${GITHUB_SHA}" | cut -c1-8)"
              echo "value=auto-${ts}-${short_sha}" >> "$GITHUB_OUTPUT"
            fi
          else
            if echo "${GITHUB_REF_NAME}" | grep -q '^bootstrap-'; then
              echo "value=${GITHUB_REF_NAME#bootstrap-}" >> "$GITHUB_OUTPUT"
            else
              ts="$(date -u +%Y%m%d%H%M%S)"
              short_sha="$(echo "${GITHUB_SHA}" | cut -c1-8)"
              echo "value=auto-${ts}-${short_sha}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build Bundle
        run: ./scripts/package_bootstrap_bundle.sh "${{ steps.version.outputs.value }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-bundle-${{ steps.version.outputs.value }}
          path: |
            dist/bootstrap-bundle-${{ steps.version.outputs.value }}.tar.gz
            dist/bootstrap-bundle-${{ steps.version.outputs.value }}.tar.gz.sha256

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: |
            dist/bootstrap-bundle-${{ steps.version.outputs.value }}.tar.gz
            dist/bootstrap-bundle-${{ steps.version.outputs.value }}.tar.gz.sha256
          generate_release_notes: true
