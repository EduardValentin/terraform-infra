name: Sync Runtime Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - test
          - prod
      app_name:
        description: "Application name"
        required: true
        default: "courseplatform"
        type: string

permissions:
  contents: read

jobs:
  sync:
    name: Sync runtime secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target host
        id: target
        env:
          TARGET_ENV: ${{ inputs.environment }}
          TEST_SSH_TARGET: ${{ secrets.TEST_SSH_TARGET }}
          PROD_SSH_TARGET: ${{ secrets.PROD_SSH_TARGET }}
        run: |
          set -euo pipefail

          if [[ "$TARGET_ENV" == "test" ]]; then
            ssh_target="$TEST_SSH_TARGET"
          elif [[ "$TARGET_ENV" == "prod" ]]; then
            ssh_target="$PROD_SSH_TARGET"
          else
            echo "Unsupported environment: $TARGET_ENV"
            exit 1
          fi

          if [[ -z "$ssh_target" ]]; then
            echo "Missing SSH target secret for environment: $TARGET_ENV"
            exit 1
          fi

          echo "ssh_target=$ssh_target" >> "$GITHUB_OUTPUT"

      - name: Install sops
        run: |
          set -euo pipefail
          SOPS_VERSION="3.9.0"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Decrypt runtime secret files
        env:
          TARGET_ENV: ${{ inputs.environment }}
          APP_NAME: ${{ inputs.app_name }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SOPS_AGE_KEY}" ]]; then
            echo "Missing required secret: SOPS_AGE_KEY"
            exit 1
          fi

          app_enc="secrets/runtime/${TARGET_ENV}/${APP_NAME}.app.env.enc"
          postgres_enc="secrets/runtime/${TARGET_ENV}/${APP_NAME}.postgres.env.enc"

          [[ -f "$app_enc" ]] || { echo "Missing encrypted file: $app_enc"; exit 1; }
          [[ -f "$postgres_enc" ]] || { echo "Missing encrypted file: $postgres_enc"; exit 1; }

          mkdir -p /tmp/runtime-secrets
          printf '%s' "$SOPS_AGE_KEY" > /tmp/runtime-secrets/age.key
          chmod 600 /tmp/runtime-secrets/age.key

          SOPS_AGE_KEY_FILE=/tmp/runtime-secrets/age.key sops --decrypt --input-type dotenv --output-type dotenv "$app_enc" > /tmp/runtime-secrets/app.env
          SOPS_AGE_KEY_FILE=/tmp/runtime-secrets/age.key sops --decrypt --input-type dotenv --output-type dotenv "$postgres_enc" > /tmp/runtime-secrets/postgres.env

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY_CI }}
          hostname: gha-terraform-infra-secrets
          tags: tag:ci

      - name: Upload and install runtime secret files
        env:
          APP_NAME: ${{ inputs.app_name }}
          SSH_TARGET: ${{ steps.target.outputs.ssh_target }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=accept-new -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo install -d -m 0755 /srv/apps/${APP_NAME} /srv/postgres"

          ssh -o StrictHostKeyChecking=accept-new -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "cat > /tmp/${APP_NAME}.app.env" < /tmp/runtime-secrets/app.env
          ssh -o StrictHostKeyChecking=accept-new -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "cat > /tmp/${APP_NAME}.postgres.env" < /tmp/runtime-secrets/postgres.env

          ssh -o StrictHostKeyChecking=accept-new -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo install -m 0600 /tmp/${APP_NAME}.app.env /srv/apps/${APP_NAME}/.env && sudo install -m 0600 /tmp/${APP_NAME}.postgres.env /srv/postgres/${APP_NAME}.env && rm -f /tmp/${APP_NAME}.app.env /tmp/${APP_NAME}.postgres.env"

      - name: Verify secret files on host
        env:
          APP_NAME: ${{ inputs.app_name }}
          SSH_TARGET: ${{ steps.target.outputs.ssh_target }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=accept-new -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo test -s /srv/apps/${APP_NAME}/.env && sudo test -s /srv/postgres/${APP_NAME}.env && sudo stat -c '%a %n' /srv/apps/${APP_NAME}/.env /srv/postgres/${APP_NAME}.env"

      - name: Cleanup decrypted files
        if: always()
        run: rm -rf /tmp/runtime-secrets
