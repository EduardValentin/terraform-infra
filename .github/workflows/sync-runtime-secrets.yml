name: Sync Runtime Secrets

on:
  push:
    branches:
      - main
    paths:
      - "secrets/runtime/**/*.enc"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - test
          - prod
      app_name:
        description: "Application name"
        required: true
        default: "courseplatform"
        type: string

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve secret sync targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_changes: ${{ steps.build.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Build matrix
        id: build
        shell: bash
        run: |
          set -euo pipefail

          matrix='[]'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix="$(echo "$matrix" | jq --arg environment "${{ inputs.environment }}" --arg app_name "${{ inputs.app_name }}" '. + [{environment:$environment, app_name:$app_name, app_changed:"true", postgres_changed:"true"}]')"
            echo "matrix=$(echo "$matrix" | jq -c '.')" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse "$head^" >/dev/null 2>&1; then
              base="$(git rev-parse "$head^")"
            else
              base="$head"
            fi
          fi

          changed_files="$(git diff --name-only "$base" "$head")"

          declare -A keys=()
          declare -A app_changed=()
          declare -A postgres_changed=()

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ ^secrets/runtime/(test|prod)/([a-zA-Z0-9_-]+)\.(app|postgres)\.env\.enc$ ]]; then
              environment="${BASH_REMATCH[1]}"
              app_name="${BASH_REMATCH[2]}"
              kind="${BASH_REMATCH[3]}"
              key="${environment}|${app_name}"

              keys["$key"]=1
              if [[ "$kind" == "app" ]]; then
                app_changed["$key"]=true
              else
                postgres_changed["$key"]=true
              fi
            fi
          done <<< "$changed_files"

          for key in "${!keys[@]}"; do
            environment="${key%%|*}"
            app_name="${key##*|}"
            app_flag="${app_changed[$key]:-false}"
            postgres_flag="${postgres_changed[$key]:-false}"

            matrix="$(echo "$matrix" | jq \
              --arg environment "$environment" \
              --arg app_name "$app_name" \
              --arg app_changed "$app_flag" \
              --arg postgres_changed "$postgres_flag" \
              '. + [{environment:$environment, app_name:$app_name, app_changed:$app_changed, postgres_changed:$postgres_changed}]')"
          done

          has_changes=false
          if [[ "$(echo "$matrix" | jq 'length')" -gt 0 ]]; then
            has_changes=true
          fi

          echo "matrix=$(echo "$matrix" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"

  sync:
    name: Sync runtime secrets (${{ matrix.environment }} / ${{ matrix.app_name }})
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve.outputs.matrix) }}
    concurrency:
      group: runtime-secrets-${{ matrix.environment }}-${{ matrix.app_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Resolve target host
        id: target
        env:
          TARGET_ENV: ${{ matrix.environment }}
          TEST_SSH_TARGET: ${{ secrets.TEST_SSH_TARGET }}
          PROD_SSH_TARGET: ${{ secrets.PROD_SSH_TARGET }}
          TEST_SSH_KNOWN_HOSTS: ${{ secrets.TEST_SSH_KNOWN_HOSTS }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          if [[ "$TARGET_ENV" == "test" ]]; then
            ssh_target="$TEST_SSH_TARGET"
            ssh_known_hosts="$TEST_SSH_KNOWN_HOSTS"
          elif [[ "$TARGET_ENV" == "prod" ]]; then
            ssh_target="$PROD_SSH_TARGET"
            ssh_known_hosts="$PROD_SSH_KNOWN_HOSTS"
          else
            echo "Unsupported environment: $TARGET_ENV"
            exit 1
          fi

          if [[ -z "$ssh_target" || -z "$ssh_known_hosts" ]]; then
            echo "Missing SSH target or known hosts secret for environment: $TARGET_ENV"
            exit 1
          fi

          echo "ssh_target=$ssh_target" >> "$GITHUB_OUTPUT"
          printf "ssh_known_hosts<<EOF\n%s\nEOF\n" "$ssh_known_hosts" >> "$GITHUB_OUTPUT"

      - name: Install sops
        run: |
          set -euo pipefail
          SOPS_VERSION="3.9.0"
          SOPS_SHA256="0d65660fbe785647ff4f1764d7f69edf598f79d6d79ebbef4a501909b6ff6b82"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          echo "${SOPS_SHA256}  /tmp/sops" | sha256sum --check --status
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Decrypt runtime secret files
        env:
          TARGET_ENV: ${{ matrix.environment }}
          APP_NAME: ${{ matrix.app_name }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SOPS_AGE_KEY}" ]]; then
            echo "Missing required secret: SOPS_AGE_KEY"
            exit 1
          fi

          app_enc="secrets/runtime/${TARGET_ENV}/${APP_NAME}.app.env.enc"
          postgres_enc="secrets/runtime/${TARGET_ENV}/${APP_NAME}.postgres.env.enc"

          [[ -f "$app_enc" ]] || { echo "Missing encrypted file: $app_enc"; exit 1; }
          [[ -f "$postgres_enc" ]] || { echo "Missing encrypted file: $postgres_enc"; exit 1; }

          mkdir -p /tmp/runtime-secrets
          printf '%s' "$SOPS_AGE_KEY" > /tmp/runtime-secrets/age.key
          chmod 600 /tmp/runtime-secrets/age.key

          SOPS_AGE_KEY_FILE=/tmp/runtime-secrets/age.key sops --decrypt --input-type dotenv --output-type dotenv "$app_enc" > /tmp/runtime-secrets/app.env
          SOPS_AGE_KEY_FILE=/tmp/runtime-secrets/age.key sops --decrypt --input-type dotenv --output-type dotenv "$postgres_enc" > /tmp/runtime-secrets/postgres.env

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY_CI_SECRETS }}
          hostname: gha-terraform-infra-secrets
          tags: tag:ci-secrets

      - name: Write pinned SSH known_hosts
        run: |
          set -euo pipefail
          printf '%s\n' "${{ steps.target.outputs.ssh_known_hosts }}" > /tmp/known_hosts
          chmod 600 /tmp/known_hosts

      - name: Upload and install runtime secret files
        env:
          APP_NAME: ${{ matrix.app_name }}
          SSH_TARGET: ${{ steps.target.outputs.ssh_target }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo install -d -m 0755 /srv/apps/${APP_NAME} /srv/postgres"

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "cat > /tmp/${APP_NAME}.app.env" < /tmp/runtime-secrets/app.env
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "cat > /tmp/${APP_NAME}.postgres.env" < /tmp/runtime-secrets/postgres.env

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo install -m 0600 /tmp/${APP_NAME}.app.env /srv/apps/${APP_NAME}/.env && sudo install -m 0600 /tmp/${APP_NAME}.postgres.env /srv/postgres/${APP_NAME}.env && rm -f /tmp/${APP_NAME}.app.env /tmp/${APP_NAME}.postgres.env"

      - name: Rolling reload app container when app secrets changed
        if: matrix.app_changed == 'true'
        env:
          APP_NAME: ${{ matrix.app_name }}
          TARGET_ENV: ${{ matrix.environment }}
          SSH_TARGET: ${{ steps.target.outputs.ssh_target }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" \
            "sudo APP_NAME='${APP_NAME}' TARGET_ENV='${TARGET_ENV}' bash -s" <<'REMOTE'
          set -euo pipefail

          app_container="${APP_NAME}-${TARGET_ENV}"
          postgres_container="${APP_NAME}-${TARGET_ENV}-postgres"
          app_env_file="/srv/apps/${APP_NAME}/.env"
          ready_path="/readyz"

          if ! docker ps --format '{{.Names}}' | grep -Fxq "$app_container"; then
            echo "app container not running, skipping rolling reload"
            exit 0
          fi

          image_ref="$(docker inspect --format '{{.Config.Image}}' "$app_container")"
          app_port="$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$app_container" | awk -F= '$1=="PORT" {print substr($0, index($0, $2)); exit}')"
          app_base_path="$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$app_container" | awk -F= '$1=="APP_BASE_PATH" {print substr($0, index($0, $2)); exit}')"
          app_port="${app_port:-8080}"
          app_base_path="${app_base_path:-/}"

          edge_network="$(docker inspect --format '{{range $k, $v := .NetworkSettings.Networks}}{{println $k}}{{break}}{{end}}' "$app_container" | head -n 1)"
          edge_network="${edge_network:-edge_default}"

          candidate="${app_container}-reload-${RANDOM}"
          labels_file="$(mktemp)"
          docker inspect --format '{{range $k, $v := .Config.Labels}}{{printf "%s=%s\n" $k $v}}{{end}}' "$app_container" > "$labels_file"

          run_args=(
            -d
            --name "$candidate"
            --restart unless-stopped
            --network "$edge_network"
            --env-file "$app_env_file"
            -e "DB_HOST=$postgres_container"
            -e "DB_PORT=5432"
            -e "PORT=$app_port"
            -e "MODE=prod"
            -e "ENVIRONMENT=$TARGET_ENV"
            -e "APP_NAME=$APP_NAME"
            -e "APP_BASE_PATH=$app_base_path"
          )

          while IFS= read -r label; do
            [[ -z "$label" ]] && continue
            run_args+=(--label "$label")
          done < "$labels_file"

          run_args+=("$image_ref")

          docker run "${run_args[@]}" >/dev/null
          rm -f "$labels_file"

          deadline=$((SECONDS + 180))
          until docker exec "$candidate" sh -lc "wget -q -O /dev/null http://127.0.0.1:${app_port}${ready_path}" >/dev/null 2>&1; do
            if (( SECONDS >= deadline )); then
              docker logs --tail=200 "$candidate" || true
              docker rm -f "$candidate" >/dev/null 2>&1 || true
              echo "candidate readiness timeout"
              exit 1
            fi
            sleep 2
          done

          docker rm -f "$app_container" >/dev/null
          docker rename "$candidate" "$app_container"
          echo "rolling reload complete for $app_container"
          REMOTE

      - name: Postgres secret change note
        if: matrix.postgres_changed == 'true'
        run: |
          echo "postgres env file updated. no automatic postgres restart is performed because init credentials in existing postgres volumes are not rotated by env-file changes alone."

      - name: Verify secret files on host
        env:
          APP_NAME: ${{ matrix.app_name }}
          SSH_TARGET: ${{ steps.target.outputs.ssh_target }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo test -s /srv/apps/${APP_NAME}/.env && sudo test -s /srv/postgres/${APP_NAME}.env && sudo stat -c '%a %n' /srv/apps/${APP_NAME}/.env /srv/postgres/${APP_NAME}.env"

      - name: Cleanup decrypted files
        if: always()
        run: rm -rf /tmp/runtime-secrets /tmp/known_hosts
