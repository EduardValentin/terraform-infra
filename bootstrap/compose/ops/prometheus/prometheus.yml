global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: ops-self
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          env: ops
          app: courseplatform
          service: prometheus
          host: ops
      - targets: ["ops-node-exporter:9100"]
        labels:
          env: ops
          app: courseplatform
          service: node-exporter
          host: ops
      - targets: ["ops-cadvisor:8080"]
        labels:
          env: ops
          app: courseplatform
          service: cadvisor
          host: ops

  - job_name: env-targets
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.json
