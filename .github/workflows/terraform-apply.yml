name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - controlplane
          - test
          - ops
          - prod
          - all
      ref:
        description: "Git ref to apply (branch, tag, or commit SHA)"
        required: true
        default: "main"
        type: string
      confirm:
        description: "Type APPLY to confirm apply operation"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate_confirmation:
    name: Confirm apply intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation token
        run: |
          if [[ "${{ inputs.confirm }}" != "APPLY" ]]; then
            echo "Confirmation token mismatch. Re-run with confirm=APPLY."
            exit 1
          fi

  resolve:
    name: Resolve target environments
    runs-on: ubuntu-latest
    needs: validate_confirmation
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build matrix
        id: build
        shell: bash
        run: |
          set -euo pipefail

          matrix='[]'
          add_env() {
            local env_name="$1"
            local env_dir="$2"
            local tfvars_secret="$3"
            local backend_secret="$4"
            matrix="$(echo "$matrix" | jq -c --arg env_name "$env_name" --arg env_dir "$env_dir" --arg tfvars_secret "$tfvars_secret" --arg backend_secret "$backend_secret" '. + [{environment: $env_name, dir: $env_dir, tfvars_secret: $tfvars_secret, backend_secret: $backend_secret}]')"
          }

          case "${{ inputs.target_environment }}" in
            controlplane)
              add_env "controlplane" "infra/envs/controlplane" "TFVARS_CONTROLPLANE" "TF_BACKEND_CONFIG_CONTROLPLANE"
              ;;
            test)
              add_env "test" "infra/envs/test" "TFVARS_TEST" "TF_BACKEND_CONFIG_TEST"
              ;;
            ops)
              add_env "ops" "infra/envs/ops" "TFVARS_OPS" "TF_BACKEND_CONFIG_OPS"
              ;;
            prod)
              add_env "prod" "infra/envs/prod" "TFVARS_PROD" "TF_BACKEND_CONFIG_PROD"
              ;;
            all)
              add_env "controlplane" "infra/envs/controlplane" "TFVARS_CONTROLPLANE" "TF_BACKEND_CONFIG_CONTROLPLANE"
              add_env "test" "infra/envs/test" "TFVARS_TEST" "TF_BACKEND_CONFIG_TEST"
              add_env "ops" "infra/envs/ops" "TFVARS_OPS" "TF_BACKEND_CONFIG_OPS"
              add_env "prod" "infra/envs/prod" "TFVARS_PROD" "TF_BACKEND_CONFIG_PROD"
              ;;
            *)
              echo "Unsupported target_environment: ${{ inputs.target_environment }}"
              exit 1
              ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  apply:
    name: Apply (${{ matrix.environment }})
    needs: resolve
    runs-on: ubuntu-latest
    env:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.resolve.outputs.matrix) }}
    concurrency:
      group: terraform-apply-${{ matrix.environment }}
      cancel-in-progress: false
    steps:
      - name: Configure git default branch
        run: sudo git config --system init.defaultBranch main

      - name: Checkout target ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_wrapper: false

      - name: Connect to Tailscale for backend access (OAuth)
        if: env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != ''
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          hostname: gha-terraform-infra-apply
          tags: tag:ci-terraform

      - name: Connect to Tailscale for backend access (Authkey fallback)
        if: env.TS_OAUTH_CLIENT_ID == '' || env.TS_OAUTH_SECRET == ''
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY_CI_TERRAFORM }}
          hostname: gha-terraform-infra-apply
          tags: tag:ci-terraform

      - name: Write backend config
        env:
          BACKEND_CONFIG: ${{ secrets[matrix.backend_secret] }}
        run: |
          set -euo pipefail
          if [[ -z "${BACKEND_CONFIG}" ]]; then
            echo "Missing required secret: ${{ matrix.backend_secret }}"
            exit 1
          fi
          printf '%s' "${BACKEND_CONFIG}" > "${{ matrix.dir }}/backend.hcl"
          endpoint_value="$(awk -F= '/^[[:space:]]*endpoint[[:space:]]*=/{v=$0; sub(/^[^=]*=[[:space:]]*/, \"\", v); gsub(/^[[:space:]]+|[[:space:]]+$/, \"\", v); gsub(/^\"|\"$/, \"\", v); print v; exit}' \"${{ matrix.dir }}/backend.hcl\")"
          force_path_style_value="$(awk -F= '/^[[:space:]]*force_path_style[[:space:]]*=/{v=$0; sub(/^[^=]*=[[:space:]]*/, \"\", v); gsub(/^[[:space:]]+|[[:space:]]+$/, \"\", v); print v; exit}' \"${{ matrix.dir }}/backend.hcl\")"
          tmp_file="$(mktemp)"
          awk '/^[[:space:]]*endpoint[[:space:]]*=/{next} /^[[:space:]]*force_path_style[[:space:]]*=/{next} {print}' \"${{ matrix.dir }}/backend.hcl\" > \"$tmp_file\"
          if [[ -n \"$endpoint_value\" ]] && ! grep -Eq '^[[:space:]]*endpoints[[:space:]]*=' \"$tmp_file\"; then
            {
              printf '\n'
              printf 'endpoints = {\n'
              printf '  s3 = \"%s\"\n' \"$endpoint_value\"
              printf '}\n'
            } >> \"$tmp_file\"
          fi
          if [[ -n \"$force_path_style_value\" ]] && ! grep -Eq '^[[:space:]]*use_path_style[[:space:]]*=' \"$tmp_file\"; then
            printf 'use_path_style = %s\n' \"$force_path_style_value\" >> \"$tmp_file\"
          fi
          mv \"$tmp_file\" \"${{ matrix.dir }}/backend.hcl\"

      - name: Write tfvars
        env:
          TFVARS_CONTENT: ${{ secrets[matrix.tfvars_secret] }}
        run: |
          set -euo pipefail
          if [[ -z "${TFVARS_CONTENT}" ]]; then
            echo "Missing required secret: ${{ matrix.tfvars_secret }}"
            exit 1
          fi
          printf '%s' "${TFVARS_CONTENT}" > "${{ matrix.dir }}/terraform.auto.tfvars"

      - name: Terraform init
        run: terraform -chdir="${{ matrix.dir }}" init -input=false -backend-config=backend.hcl

      - name: Terraform fmt check
        continue-on-error: true
        run: terraform -chdir="${{ matrix.dir }}" fmt -check

      - name: Terraform validate
        run: terraform -chdir="${{ matrix.dir }}" validate

      - name: Import pre-existing controlplane resources (best effort)
        if: matrix.environment == 'controlplane'
        run: |
          set -euo pipefail
          terraform -chdir="${{ matrix.dir }}" import -input=false -var-file=terraform.auto.tfvars 'tailscale_acl.policy[0]' acl || true
          terraform -chdir="${{ matrix.dir }}" import -input=false -var-file=terraform.auto.tfvars 'github_actions_variable.repository["course-platform:TEST_APP_HOSTNAME"]' 'course-platform:TEST_APP_HOSTNAME' || true
          terraform -chdir="${{ matrix.dir }}" import -input=false -var-file=terraform.auto.tfvars 'github_actions_variable.repository["course-platform:TEST_APP_BASE_PATH"]' 'course-platform:TEST_APP_BASE_PATH' || true
          terraform -chdir="${{ matrix.dir }}" import -input=false -var-file=terraform.auto.tfvars 'github_actions_variable.repository["course-platform:PROD_APP_HOSTNAME"]' 'course-platform:PROD_APP_HOSTNAME' || true
          terraform -chdir="${{ matrix.dir }}" import -input=false -var-file=terraform.auto.tfvars 'github_actions_variable.repository["course-platform:PROD_APP_BASE_PATH"]' 'course-platform:PROD_APP_BASE_PATH' || true

      - name: Terraform plan (pre-apply)
        run: |
          set -euo pipefail
          terraform -chdir="${{ matrix.dir }}" plan -input=false -var-file=terraform.auto.tfvars -out=tfplan.bin

      - name: Terraform apply
        run: terraform -chdir="${{ matrix.dir }}" apply -input=false -auto-approve tfplan.bin

      - name: Cleanup local plan files
        if: always()
        run: rm -f "${{ matrix.dir }}/backend.hcl" "${{ matrix.dir }}/terraform.auto.tfvars" "${{ matrix.dir }}/tfplan.bin" "${{ matrix.dir }}/tfplan.txt"
