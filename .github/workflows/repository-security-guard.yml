name: Repository Security Guard

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret scanning and push protection
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          security_json="$(gh api "repos/${REPOSITORY}" --jq '.security_and_analysis')"
          secret_scanning="$(echo "$security_json" | jq -r '.secret_scanning.status // "disabled"')"
          push_protection="$(echo "$security_json" | jq -r '.secret_scanning_push_protection.status // "disabled"')"

          echo "secret_scanning=${secret_scanning}"
          echo "secret_scanning_push_protection=${push_protection}"

          if [[ "$secret_scanning" != "enabled" || "$push_protection" != "enabled" ]]; then
            echo "repository security guard failed: secret scanning and push protection must both be enabled"
            exit 1
          fi
