name: Runtime Secrets Guard

on:
  pull_request:
    branches:
      - main
    paths:
      - "secrets/runtime/**/*.enc"
  push:
    branches:
      - main
    paths:
      - "secrets/runtime/**/*.enc"

permissions:
  contents: read

jobs:
  guard:
    name: Validate runtime secret pairs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Validate changed env/app secret pairs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse "$head^" >/dev/null 2>&1; then
              base="$(git rev-parse "$head^")"
            else
              base="$head"
            fi
          fi

          changed_files="$(git diff --name-only "$base" "$head")"

          declare -A keys=()

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ ^secrets/runtime/(test|prod)/([a-zA-Z0-9_-]+)\.(app|postgres)\.env\.enc$ ]]; then
              environment="${BASH_REMATCH[1]}"
              app_name="${BASH_REMATCH[2]}"
              key="${environment}|${app_name}"
              keys["$key"]=1
            fi
          done <<< "$changed_files"

          if [[ ${#keys[@]} -eq 0 ]]; then
            echo "No runtime secret file changes detected."
            exit 0
          fi

          missing=0

          for key in "${!keys[@]}"; do
            environment="${key%%|*}"
            app_name="${key##*|}"

            app_file="secrets/runtime/${environment}/${app_name}.app.env.enc"
            postgres_file="secrets/runtime/${environment}/${app_name}.postgres.env.enc"

            if [[ ! -f "$app_file" ]]; then
              echo "Missing required companion file: $app_file"
              missing=1
            fi

            if [[ ! -f "$postgres_file" ]]; then
              echo "Missing required companion file: $postgres_file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Runtime secret guard failed: every touched env/app must have both app and postgres encrypted files present."
            exit 1
          fi

          echo "Runtime secret guard passed."
